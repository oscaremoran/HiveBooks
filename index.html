<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiveBooks 🐝</title>
  <!-- ?v= busts the browser cache. Bump it whenever css/js changes. -->
  <link rel="stylesheet" href="css/styles.css?v=2" />
</head>
<body>

  <!-- ===== Flying bees layer (behind everything, non-interactive) ===== -->
  <div class="bee-field" id="beeField" aria-hidden="true"></div>

  <!-- ============================ AUTH VIEW ============================ -->
  <section class="view auth-view active" id="view-auth">
    <div class="auth-card">
      <h1 class="brand">Hive<span>Books</span> <span class="brand-bee">🐝</span></h1>
      <p class="tagline">Book recommendations, straight from the hive.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">LOGIN</button>
        <button class="auth-tab" data-mode="create">CREATE ACCOUNT</button>
      </div>

      <form id="authForm" autocomplete="off">
        <label>
          Username
          <input type="text" id="username" name="username" required />
        </label>
        <label>
          Password
          <input type="password" id="password" name="password" required />
        </label>
        <p class="form-msg" id="authMsg"></p>
        <button type="submit" class="btn-primary" id="authSubmit">LOGIN</button>
      </form>
    </div>
  </section>

  <!-- ========================= HONEYCOMB HOME ========================= -->
  <section class="view honeycomb-view" id="view-home">
    <header class="app-header">
      <h1 class="brand small">Hive<span>Books</span> 🐝</h1>
      <span class="welcome" id="welcomeUser"></span>
    </header>

    <div class="honeycomb" id="honeycomb"><!-- hexagons injected by app.js --></div>
  </section>

  <!-- ===================== GENERIC CONTENT VIEW ====================== -->
  <section class="view content-view" id="view-content">
    <header class="app-header">
      <button class="btn-back" id="backHome">🍯 Back to Honeycomb</button>
      <h1 class="brand small">Hive<span>Books</span> 🐝</h1>
    </header>
    <div class="content-body" id="contentBody"><!-- filled by app.js --></div>
  </section>

  <script src="js/config.js?v=2"></script>
  <script src="js/books.js?v=2"></script>
  <script src="js/storage.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
